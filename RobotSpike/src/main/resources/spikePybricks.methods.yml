SPEED_FROM_PERCENT:
  PYTHON: |
    def get_speed_from_percent(percent):
        max_deg_s = 810.0
        return int(max_deg_s * (percent/100.0))

    def get_speed_from_power_percent(percent):
        if percent == 0: return 0
        sign = percent/abs(percent)
        percent = abs(percent)
        return sign * (554817600 + (6.766832 - 554817600)/(1 + (percent/2859.588)**4.011089))

GESTURES:
  PYTHON: |
    def get_acceleration():
        return sqrt((abs(hub.imu.acceleration()[0])**2) + (abs(hub.imu.acceleration()[1])**2) + (abs(hub.imu.acceleration()[2])**2))

    def is_free_fall():
        threshold = 350
        stopWatch.time()
        start = stopWatch.time()
        while start - stopWatch.time() < 333:
            if(get_acceleration() < threshold): 
                return True;
        return False

    def is_tapped():
        threshold = 3500
        val = 0.0
        prev_val = get_acceleration()
        start = stopWatch.time()
        while start - stopWatch.time() < 333:
            val = get_acceleration()
            if abs(val - prev_val) > threshold:
                return True
        return False

    def is_shaken():
        count_tapped = 0
        while is_tapped():
            if is_tapped():
                count_tapped += 1
                wait(200)
            if count_tapped >= 3:
                return True
        return False

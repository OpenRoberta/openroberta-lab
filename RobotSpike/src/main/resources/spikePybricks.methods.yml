    def circle_circumference(diameter):
        return 3.1415926535 * (diameter)
    
    def tank_drive_dist(dist, left_speed, right_speed):
        sign = dist/abs(dist)
        dist = abs(dist)
        left_seconds_per_mm =  (left_speed/360) * circle_circumference(WHEEL_DIAMETER)
        right_seconds_per_mm = (right_speed/360) * circle_circumference(WHEEL_DIAMETER)
        wait_time = (dist*10)/((left_seconds_per_mm + right_seconds_per_mm)/2)
        tank_drive(sign * left_speed, sign * right_speed)
        wait(wait_time*1000)


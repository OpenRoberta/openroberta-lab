HSVTORGB:
  PYTHON: |
    def hsv2rgb(color):
        h = float(color.h)
        s = float(color.s / 100.0)
        v = float(color.v / 100.0)
    
        c = v * s
        x = c * (1 - abs(((h/60.0) % 2) - 1))
        m = v - c

        if 0.0 <= h < 60:
            rgb = (c, x, 0)
        elif 0.0 <= h < 120:
            rgb = (x, c, 0)
        elif 0.0 <= h < 180:
            rgb = (0, c, x)
        elif 0.0 <= h < 240:
            rgb = (0, x, c)
        elif 0.0 <= h < 300:
            rgb = (x, 0, c)
        elif 0.0 <= h < 360:
            rgb = (c, 0, x)
    
        return list(map(lambda n: (n + m) * 255, rgb))  


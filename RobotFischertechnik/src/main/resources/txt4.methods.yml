## FunctionNames

MOTORSTART:
  PYTHON: |
    def motorStart(motor, speed):
        motor.set_speed(int((speed / 100) * 512), Motor.CCW)
        motor.start()

MOTORSTARTFOR:
  PYTHON: |
    def motorStartFor(motor, speed, degrees):
        steps = int((degrees / 360) * STEPS_PER_ROTATION)
        motor.set_speed(int((speed / 100) * 512), Motor.CCW)
        motor.set_distance(steps)
        while True:
            if(not motor.is_running()):
                break;
            time.sleep(0.010)
        motor.stop()

OMNIDRIVEVERTICAL:
  PYTHON: |
    def omnidriveVertical(speed):
        motorStart(frontLeftMotor, speed)
        motorStart(frontRightMotor, speed)
        motorStart(rearLeftMotor, speed)
        motorStart(rearRightMotor, speed)

OMNIDRIVEHORIZONTAL:
  PYTHON: |
    def omnidriveHorizontal(speed):
        motorStart(frontLeftMotor, -speed)
        motorStart(frontRightMotor, speed)
        motorStart(rearLeftMotor, speed)
        motorStart(rearRightMotor, -speed)

OMNIDRIVEDIAGONALTL:
  PYTHON: |
    def omnidriveDiagonalTL(speed):
        frontLeftMotor.stop_sync(rearRightMotor)
        motorStart(frontRightMotor, speed)
        motorStart(rearLeftMotor, speed)

OMNIDRIVEDIAGONALTR:
  PYTHON: |
    def omnidriveDiagonalTR(speed):
        frontRightMotor.stop_sync(rearLeftMotor)
        motorStart(frontLeftMotor, speed)
        motorStart(rearRightMotor, speed)

OMNIDRIVETURN:
  PYTHON: |
    def omnidriveTurn(speed):
        motorStart(frontLeftMotor, speed)
        motorStart(frontRightMotor, -speed)
        motorStart(rearLeftMotor, speed)
        motorStart(rearRightMotor, -speed)

OMNIDRIVETURNDEGREES:
  PYTHON: |
    def omnidriveTurnDegrees(speed, angle):
        speed =  int((speed / 100) * 512)
        frontLeftMotor.set_speed(speed, Motor.CCW)
        frontRightMotor.set_speed(speed, Motor.CW)
        rearLeftMotor.set_speed(speed, Motor.CCW)
        rearRightMotor.set_speed(speed, Motor.CW)
        frontLeftMotor.set_distance(int(round(angle * 1.7)), frontRightMotor, rearLeftMotor, rearRightMotor)
        while True:
            if(not frontLeftMotor.is_running() and not frontRightMotor.is_running() and not rearLeftMotor.is_running() and not rearRightMotor.is_running()):
                break;
            time.sleep(0.010)
        frontLeftMotor.stop_sync(frontRightMotor, rearLeftMotor, rearRightMotor)
    

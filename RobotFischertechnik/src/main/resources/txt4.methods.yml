DIFFERENTIALDRIVEDISTANCE:
  PYTHON: |
    def diffDriveDistance(distance, speedL, speedR):
        if distance < 0:
            speedL = -speedL
            speedR = -speedR
        leftDirection = 1 if speedL > 0 else -1
        rightDirection = 1 if speedR > 0 else -1
        diffDrive(speedL, speedR)
        wheelCircumference = WHEEL_DIAMETER * math.pi
        time.sleep(0.010)
        while True:
            distanceLeft = leftDirection * (wheelCircumference * leftMotor.get_distance() / STEPS_PER_ROTATION);
            distanceRight = rightDirection * (wheelCircumference * rightMotor.get_distance() / STEPS_PER_ROTATION);
            distanceTraveled = (distanceLeft + distanceRight) / 2
            if (abs(distanceTraveled) >= abs(distance)):
                leftMotor.stop_sync(rightMotor)
                break;
            time.sleep(0.010)


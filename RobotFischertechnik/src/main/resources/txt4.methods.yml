OMNIDRIVETURNDEGREES:
  PYTHON: |
    def omnidriveTurnDegrees(speed, degrees):
        speed =  int((speed / 100) * 512)
        rotations = (WHEEL_DIAMETER * math.pi * degrees) / (360 * TRACK_WIDTH)
        stepsPerWheel = int(rotations * STEPS_PER_ROTATION)
    
    
        frontLeftMotor.set_speed(speed, Motor.CCW)
        frontRightMotor.set_speed(speed, Motor.CW)
        rearLeftMotor.set_speed(speed, Motor.CCW)
        rearRightMotor.set_speed(speed, Motor.CW)
        frontLeftMotor.set_distance(stepsPerWheel, frontRightMotor, rearLeftMotor, rearRightMotor)
        while True:
            if( not frontLeftMotor.is_running() and not frontRightMotor.is_running() and not rearLeftMotor.is_running() and not rearRightMotor.is_running() ):
                break;
            time.sleep(0.010)
        frontLeftMotor.stop_sync(frontRightMotor, rearLeftMotor, rearRightMotor)

DIFFDRIVETURNDEGREES:
  PYTHON: |
    def diffDriveTurnDegrees(speed, degrees):
        speed =  int((speed / 100) * 512)
        arc_length = math.radians(degrees) * (TRACK_WIDTH / 2)
        rotations = arc_length / (WHEEL_DIAMETER * math.pi)
        stepsPerWheel = int(rotations * STEPS_PER_ROTATION)

        leftMotor.set_speed(speed, Motor.CCW)
        rightMotor.set_speed(speed, Motor.CW)
        leftMotor.set_distance(stepsPerWheel, rightMotor)
        while True:
            if(not leftMotor.is_running() and not rightMotor.is_running()):
                break;
            time.sleep(0.010)
        leftMotor.stop_sync(rightMotor)

DISPLAYLEDON:
  PYTHON: |
    def ledOn(color_hex):
        global current_led
        color_led = getClosestColor(color_hex) + "Led"
        if ( color_led != current_led ):
            display.set_attr(color_led + ".visible", str(True).lower())
            display.set_attr(current_led + ".visible", str(False).lower())
            current_led = color_led
        display.set_attr(current_led + ".active", str(True).lower())
    
    def getClosestColor(hex_value):
        r, g, b = (hex_value >> i & 0xFF for i in (16, 8, 0))
        color_diffs = []
        for name, color in led_colors.items():
            cr, cg, cb = (color >> i & 0xFF for i in (16, 8, 0))
            # Euclidean distance calculation
            distance = math.sqrt((r - cr) ** 2 + (g - cg) ** 2 + (b - cb) ** 2)
            color_diffs.append((distance, name))
        return min(color_diffs)[1]


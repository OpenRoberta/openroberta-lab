## FunctionNames

MOTORSTART:
  PYTHON: |
    def motorStart(motor, speed):
        motor.set_speed(int((speed / 100) * 512), Motor.CCW)
        motor.start()


MOTORSTARTFOR:
  PYTHON: |
    def motorStartFor(motor, speed, degrees):
        steps = int((degrees / 360) * STEPS_PER_ROTATION)
        motor.set_speed(int((speed / 100) * 512), Motor.CCW)
        motor.set_distance(steps)
        while True:
            if(not motor.is_running()):
                break;
            time.sleep(0.010)
        motor.stop()
OMNIDRIVEVERTICAL:
  PYTHON: |
    def omnidriveVertical(motorFL, motorFR, motorRL, motorRR, speed):
        motorStart(motorFL, speed)
        motorStart(motorFR, speed)
        motorStart(motorRL, speed)
        motorStart(motorRR, speed)

OMNIDRIVEHORIZONTAL:
  PYTHON: |
    def omnidriveHorizontal(motorFL, motorFR, motorRL, motorRR, speed):
        motorStart(motorFL, -speed)
        motorStart(motorFR, speed)
        motorStart(motorRL, speed)
        motorStart(motorRR, -speed)

OMNIDRIVEDIAGONALTL:
  PYTHON: |
    def omnidriveDiagonalTL(motorFL, motorFR, motorRL, motorRR, speed):
        motorFL.stop_sync(motorRR)
        motorStart(motorFR, speed)
        motorStart(motorRL, speed)

OMNIDRIVEDIAGONALTR:
  PYTHON: |
    def omnidriveDiagonalTR(motorFL, motorFR, motorRL, motorRR, speed):
        motorFR.stop_sync(motorRL)
        motorStart(motorFL, speed)
        motorStart(motorRR, speed)

OMNIDRIVETURN:
  PYTHON: |
    def omnidriveTurn(motorFL, motorFR, motorRL, motorRR, speed):
        motorStart(motorFL, speed)
        motorStart(motorFR, -speed)
        motorStart(motorRL, speed)
        motorStart(motorRR, -speed)

OMNIDRIVETURNDEGREES:
  PYTHON: |
    def omnidriveTurnDegrees(motorFL, motorFR, motorRL, motorRR, speed, angle):
        speed =  int((speed / 100) * 512)
        motorFL.set_speed(speed, Motor.CCW)
        motorFR.set_speed(speed, Motor.CW)
        motorRL.set_speed(speed, Motor.CCW)
        motorRR.set_speed(speed, Motor.CW)
        motorFL.set_distance(int(round(angle * 1.7)), motorFR, motorRL, motorRR)
        while True:
            if(not motorFL.is_running() and not motorFR.is_running() and not motorRL.is_running() and not motorRR.is_running()):
                break;
            time.sleep(0.010)
        motorFL.stop_sync(motorFR, motorRL, motorRR)
    
